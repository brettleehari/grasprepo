<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}grasprepo{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/vis-network@9.1.6/standalone/umd/vis-network.min.js"></script>
</head>
<body>
    <nav>
        <div class="container">
            <a href="/" class="brand">grasp<span>repo</span></a>
            <div class="links">
                <a href="/" {% if active == 'home' %}class="active"{% endif %}>Analyze</a>
            </div>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    grasp<span>repo</span> &mdash; Repository analysis powered by PageRank &amp; code churn metrics
                </div>
                <div class="footer-author">
                    Built by <strong>Hari Prasad Sudharsan</strong>
                    <span class="footer-links">
                        <a href="https://linkedin.com/in/haripm4ai" target="_blank">LinkedIn</a>
                        <a href="https://github.com/brettleehari" target="_blank">GitHub</a>
                        <a href="https://brettleehari.medium.com" target="_blank">Medium</a>
                        <a href="https://github.com/brettleehari/aboutme" target="_blank">About</a>
                    </span>
                </div>
            </div>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
