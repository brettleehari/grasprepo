<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}grasprepo{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/vis-network@9.1.6/standalone/umd/vis-network.min.js"></script>
</head>
<body>
    <nav>
        <div class="container">
            <a href="/" class="brand">grasp<span>repo</span></a>
            <div class="links">
                <a href="/" {% if active == 'home' %}class="active"{% endif %}>Analyze</a>
            </div>
            <div class="nav-cta">
                <a href="https://github.com/brettleehari/grasprepo" target="_blank" class="nav-cta-btn nav-cta-github">
                    <svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor"><path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.75.75 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25z"/></svg>
                    Star on GitHub
                </a>
                <a href="https://medium.com/@brettleehari/how-will-you-design-a-code-assist-8cbc085a08cd" target="_blank" class="nav-cta-btn nav-cta-medium">
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M13.54 12a6.8 6.8 0 01-6.77 6.82A6.8 6.8 0 010 12a6.8 6.8 0 016.77-6.82A6.8 6.8 0 0113.54 12zm7.42 0c0 3.54-1.51 6.42-3.38 6.42-1.87 0-3.39-2.88-3.39-6.42s1.52-6.42 3.39-6.42 3.38 2.88 3.38 6.42M24 12c0 3.17-.53 5.75-1.19 5.75-.66 0-1.19-2.58-1.19-5.75s.53-5.75 1.19-5.75C23.47 6.25 24 8.83 24 12z"/></svg>
                    Read on Medium
                </a>
            </div>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    grasp<span>repo</span> | Repository analysis powered by PageRank &amp; code churn metrics
                </div>
                <div class="footer-author">
                    Built by <strong>Hari Prasad Sudharsan</strong>
                    <span class="footer-links">
                        <a href="https://linkedin.com/in/haripm4ai" target="_blank">LinkedIn</a>
                        <a href="https://github.com/brettleehari" target="_blank">GitHub</a>
                        <a href="https://medium.com/@brettleehari/how-will-you-design-a-code-assist-8cbc085a08cd" target="_blank">Medium</a>
                        <a href="https://brettleehari.github.io/aboutme/" target="_blank">About</a>
                    </span>
                </div>
            </div>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
