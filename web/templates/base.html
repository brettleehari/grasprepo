<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}grasprepo{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/vis-network@9.1.6/standalone/umd/vis-network.min.js"></script>
</head>
<body>
    <nav>
        <div class="container">
            <a href="/" class="brand">grasp<span>repo</span></a>
            <div class="links">
                <a href="/" {% if active == 'home' %}class="active"{% endif %}>Analyze</a>
            </div>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            grasprepo &mdash; Repository analysis powered by PageRank &amp; code churn metrics
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
